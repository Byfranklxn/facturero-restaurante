<!DOCTYPE html>
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturero Gourmet - Meraki Fresh</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --verde-pino: #1F4529;
            --verde-saludable: #47663B;
            --crema-fondo: #F9F9F6;
            --texto-oscuro: #2C3531;
            --lineas: #D4D4CE;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #EAEAE5;
            color: var(--texto-oscuro);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #factura-container {
            background-color: var(--crema-fondo);
            width: 100%;
            max-width: 800px;
            padding: 40px 50px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border-radius: 4px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--verde-pino);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-container img { 
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid var(--verde-saludable);
        }

        .info-empresa { text-align: right; }
        .info-empresa h1 {
            font-family: 'Playfair Display', serif;
            color: var(--verde-pino);
            margin: 0 0 5px 0;
            font-size: 28px;
            letter-spacing: 1px;
        }
        .info-empresa p {
            margin: 2px 0;
            font-size: 12px;
            color: var(--verde-saludable);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .datos-cliente {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            gap: 30px;
        }
        .datos-cliente > div { flex: 1; }

        .input-group {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }

        .input-group label {
            font-weight: 600;
            width: 110px;
            color: var(--verde-pino);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .input-group input, .input-group select {
            flex: 1;
            border: none;
            border-bottom: 1px solid var(--lineas);
            background: transparent;
            padding: 8px 5px;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            color: var(--texto-oscuro);
            transition: border-color 0.3s;
        }
        .input-group input:focus, .input-group select:focus { border-bottom: 1px solid var(--verde-pino); }

        table { width: 100%; border-collapse: collapse; margin-bottom: 25px; }
        th {
            font-family: 'Playfair Display', serif;
            border-bottom: 2px solid var(--verde-pino);
            color: var(--verde-pino);
            padding: 10px;
            text-align: left;
            font-size: 16px;
            font-weight: 600;
        }
        td { padding: 12px 10px; border-bottom: 1px solid var(--lineas); }
        td input {
            width: 100%; border: none; background: transparent;
            font-family: inherit; font-size: 15px; outline: none;
        }

        .col-cant { width: 10%; text-align: center; }
        .col-desc { width: 50%; }
        .col-precio { width: 20%; text-align: right; }
        .col-total { width: 20%; text-align: right; font-weight: 600; }
        .col-cant input { text-align: center; }
        .col-precio input { text-align: right; }

        .totales { display: flex; justify-content: flex-end; margin-top: 10px; }
        .totales-box {
            width: 350px; background-color: white;
            padding: 20px; border: 1px solid var(--lineas);
        }
        .totales-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 15px; }
        .totales-row input {
            width: 80px; text-align: right; border: none;
            border-bottom: 1px solid var(--lineas); background: transparent;
            font-family: inherit; font-size: 15px; outline: none;
        }
        .gran-total {
            font-family: 'Playfair Display', serif;
            font-size: 22px; font-weight: 600; color: var(--verde-pino);
            border-top: 1px solid var(--lineas); padding-top: 12px; margin-top: 8px;
        }

        .footer-msg {
            text-align: center; margin-top: 40px;
            font-family: 'Playfair Display', serif;
            font-style: italic; color: var(--verde-saludable); font-size: 18px;
        }

        .botones-accion {
            display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center;
        }
        button {
            padding: 12px 24px; border: none; border-radius: 3px;
            cursor: pointer; font-size: 14px; font-family: 'Montserrat', sans-serif;
            font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .btn-pdf { background-color: var(--verde-pino); color: white; }
        .btn-pdf:hover { background-color: #15321d; }
        .btn-add { background-color: transparent; color: var(--verde-pino); border: 1px solid var(--verde-pino); }
        .btn-add:hover { background-color: var(--verde-pino); color: white; }
        .btn-historial { background-color: #47663B; color: white; }
        .btn-historial:hover { background-color: #2E4725; }

        #seccion-historial {
            display: none; width: 100%; max-width: 800px;
            background: white; padding: 30px; border-radius: 4px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 40px;
        }
        #seccion-historial h2 { color: var(--verde-pino); margin-top: 0; }
        .historial-item {
            display: flex; justify-content: space-between;
            padding: 10px; border-bottom: 1px solid #eee;
        }
        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
    </style>
</head>
<body>

    <div class="botones-accion" data-html2canvas-ignore="true">
        <button class="btn-add" onclick="agregarFila()">+ Añadir Plato</button>
        <button class="btn-pdf" onclick="descargarPDF()">⬇ Generar Factura</button>
        <button class="btn-historial" onclick="toggleHistorial()">📋 Ver Historial</button>
    </div>

    <div id="seccion-historial" data-html2canvas-ignore="true">
        <h2>Historial de Facturas Guardadas</h2>
        <div id="lista-historial">Aún no hay facturas guardadas.</div>
    </div>

    <div id="factura-container">
        <div class="header">
            <div class="logo-container">
                <img src="meraki-fresh.png" alt="Logo Meraki Fresh">
            </div>
            <div class="info-empresa">
                <h1>Meraki Fresh</h1>
                <p>Nutrición con Propósito</p>
                <p>Tel: 312 717 1850</p>
            </div>
        </div>

        <div class="datos-cliente">
            <div>
                <div class="input-group">
                    <label>Cliente</label>
                    <input type="text" id="nombre-cliente" placeholder="Nombre completo">
                </div>
                <div class="input-group">
                    <label>
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326zM7.994 14.521a6.6 6.6 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.56 6.56 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592m3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.73.73 0 0 0-.529.247c-.182.198-.691.677-.691 1.654s.71 1.916.81 2.049c.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232"/>
                        </svg>
                        Celular
                    </label>
                    <input type="tel" placeholder="Número con código de país">
                </div>
            </div>
            <div>
                <div class="input-group">
                    <label>Orden No.</label>
                    <input type="text" id="num-factura" readonly style="font-weight: bold; color: var(--verde-pino);">
                </div>
                <div class="input-group">
                    <label>Fecha</label>
                    <input type="text" id="fecha-actual" readonly>
                </div>
                <div class="input-group">
                    <label>Método Pago</label>
                    <select id="metodo-pago">
                        <option value="Efectivo">Efectivo</option>
                        <option value="Transferencia">Transferencia</option>
                    </select>
                </div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th class="col-cant">Cant.</th>
                    <th class="col-desc">Descripción del Plato / Producto</th>
                    <th class="col-precio">Precio Unit.</th>
                    <th class="col-total">Total</th>
                </tr>
            </thead>
            <tbody id="tabla-productos">
                <tr>
                    <td class="col-cant"><input type="number" class="cant" placeholder="0" oninput="calcularTotal()"></td>
                    <td class="col-desc"><input type="text" placeholder="Descripción del producto"></td>
                    <td class="col-precio"><input type="number" class="precio" placeholder="0" oninput="calcularTotal()"></td>
                    <td class="col-total"><span class="total-fila">$0</span></td>
                </tr>
            </tbody>
        </table>

        <div class="totales">
            <div class="totales-box">
                <div class="totales-row">
                    <span>Subtotal</span>
                    <span id="subtotal-final">$0</span>
                </div>
                <div class="totales-row">
                    <span>Domicilio</span>
                    <span>$<input type="number" id="precio-domicilio" placeholder="0" oninput="calcularTotal()"></span>
                </div>
                <div class="totales-row gran-total">
                    <span>TOTAL</span>
                    <span id="gran-total">$0</span>
                </div>
            </div>
        </div>

        <div class="footer-msg">
            ¡Gracias por nutrir tu cuerpo con Meraki Fresh!
        </div>
    </div>

    <script>
        window.onload = function() {
            const hoy = new Date();
            const opcionesFecha = { year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('fecha-actual').value = hoy.toLocaleDateString('es-CO', opcionesFecha);

            let folioActual = localStorage.getItem('meraki_folio');
            if (!folioActual) {
                folioActual = 110;
                localStorage.setItem('meraki_folio', folioActual);
            }
            document.getElementById('num-factura').value = folioActual;
        };

        function agregarFila() {
            const tabla = document.getElementById('tabla-productos');
            const nuevaFila = document.createElement('tr');
            nuevaFila.innerHTML = `
                <td class="col-cant"><input type="number" class="cant" placeholder="0" oninput="calcularTotal()"></td>
                <td class="col-desc"><input type="text" placeholder="Descripción del producto"></td>
                <td class="col-precio"><input type="number" class="precio" placeholder="0" oninput="calcularTotal()"></td>
                <td class="col-total"><span class="total-fila">$0</span></td>
            `;
            tabla.appendChild(nuevaFila);
        }

        let totalNumerico = 0; 

        function calcularTotal() {
            const filas = document.querySelectorAll('#tabla-productos tr');
            let subtotal = 0;

            filas.forEach(fila => {
                const cantidad = parseFloat(fila.querySelector('.cant').value) || 0;
                const precio = parseFloat(fila.querySelector('.precio').value) || 0;
                
                const totalFila = cantidad * precio;
                fila.querySelector('.total-fila').innerText = '$' + totalFila.toLocaleString('es-CO');
                
                subtotal += totalFila;
            });

            const domicilio = parseFloat(document.getElementById('precio-domicilio').value) || 0;
            totalNumerico = subtotal + domicilio;

            document.getElementById('subtotal-final').innerText = '$' + subtotal.toLocaleString('es-CO');
            document.getElementById('gran-total').innerText = '$' + totalNumerico.toLocaleString('es-CO');
        }

        function descargarPDF() {
            const elemento = document.getElementById('factura-container');
            const clienteInput = document.getElementById('nombre-cliente').value || "Cliente";
            const numFactura = document.getElementById('num-factura').value;
            const fechaActual = document.getElementById('fecha-actual').value;
            
            const opciones = {
                margin:       0.2,
                filename:     `Factura_Meraki_${numFactura}_${clienteInput}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            html2pdf().set(opciones).from(elemento).save().then(() => {
                guardarEnHistorial(numFactura, clienteInput, fechaActual, totalNumerico);
                
                let nuevoFolio = parseInt(numFactura) + 1;
                localStorage.setItem('meraki_folio', nuevoFolio);
                document.getElementById('num-factura').value = nuevoFolio;
            });
        }

        function guardarEnHistorial(folio, cliente, fecha, total) {
            let historial = JSON.parse(localStorage.getItem('meraki_historial')) || [];
            const metodoPago = document.getElementById('metodo-pago').value;
            historial.push({
                folio: folio,
                cliente: cliente,
                fecha: fecha,
                pago: metodoPago,
                total: '$' + total.toLocaleString('es-CO')
            });
            localStorage.setItem('meraki_historial', JSON.stringify(historial));
            actualizarVistaHistorial();
        }

        function toggleHistorial() {
            const seccion = document.getElementById('seccion-historial');
            if (seccion.style.display === 'none' || seccion.style.display === '') {
                seccion.style.display = 'block';
                actualizarVistaHistorial();
            } else {
                seccion.style.display = 'none';
            }
        }

        function actualizarVistaHistorial() {
            const lista = document.getElementById('lista-historial');
            let historial = JSON.parse(localStorage.getItem('meraki_historial')) || [];
            
            if (historial.length === 0) {
                lista.innerHTML = "Aún no hay facturas guardadas.";
                return;
            }

            historial.reverse(); 
            
            let html = "";
            historial.forEach(item => {
                html += `
                <div class="historial-item">
                    <strong>Orden #${item.folio}</strong>
                    <span>${item.cliente}</span>
                    <span style="font-size: 13px; color: gray;">(${item.pago})</span>
                    <strong style="color: var(--verde-pino)">${item.total}</strong>
                </div>`;
            });
            lista.innerHTML = html;
        }
    </script>
</body>
</html>
